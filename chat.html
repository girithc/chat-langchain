                  }))
                })
              }]
            }
          })
        });

        if (!reloadRes.ok) {
          const errText = await reloadRes.text();
          throw new Error(`Sandbox API error (${reloadRes.status}): ${errText.slice(0, 200)}`);
        }

        const result = await reloadRes.json();

        // Parse the sandbox response
        const aiMsgs = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMsgs[aiMsgs.length - 1];
        if (!lastAi || !lastAi.content) {
          console.error("Missing AI message content in result:", result);
          if (result.error) {
            throw new Error(`Execution failed: ${result.error}`);
          }
          throw new Error('No response from sandbox agent');
        }

        const sandboxResult = parseJsonFromAiContent(lastAi.content);

        // Display output
        if (sandboxResult.steps && Array.isArray(sandboxResult.steps)) {
          for (const step of sandboxResult.steps) {
            const isDebug = step.action === 'debug_fix' || step.action === 'chat_debug_fix';
            const isRewrite = step.action === 'rewrite_files';
            const isFixDeps = step.action === 'install_fix_deps';

            if (isDebug) termLog(`⟳ ${step.command || step.action}`, 'term-info');
            else if (isRewrite) termLog(`✏ ${step.command || step.action}`, 'term-info');
            else if (isFixDeps) termLog(`📦 ${step.command || step.action}`, 'term-info');
            else termLog(`⟫ ${step.command || step.action}`, 'term-cmd');

            if (step.stdout) termLog(step.stdout);
            if (step.stderr) termLog(step.stderr, 'term-err');
            if (step.exit_code !== undefined && step.exit_code !== 0) {
              termLog(`✗ Exit code: ${step.exit_code}`, 'term-err');
            }
          }
        }

        if (sandboxResult.output) termLog(sandboxResult.output);

        if (sandboxResult.retry_count && sandboxResult.retry_count > 0) {
          termLog(`ℹ Auto-fixed after ${sandboxResult.retry_count} debug cycle(s)`, 'term-info');
        }

        if (sandboxResult.error) {
          if (sandboxResult.error.includes("evicted by E2B") || sandboxResult.error.includes("Paused sandbox") || sandboxResult.error.includes("not found")) {
            termLog('⟲ Sandbox was paused or evicted due to inactivity. Re-creating sandbox...', 'term-info');
            _editorState.sandboxId = null;
            return runInSandbox();
          }
          termLog(`✗ Error: ${sandboxResult.error}`, 'term-err');
          updateSandboxStatus('stopped', 'Error');
        } else {
          updateSandboxStatus('running', 'Running');
          termLog('✓ Agent synced and running!', 'term-info');
          saveCurrentSession();
        }

      } catch (err) {
        console.error('Hot reload error:', err);
        termLog(`✗ ${err.message}`, 'term-err');
        updateSandboxStatus('stopped', 'Failed');
        showError(`Hot reload error: ${err.message}`);
      } finally {
        if (runBtn) {
          runBtn.disabled = false;
          runBtn.innerHTML = '▶ Re-run';
        }
      }
    }

      if (e.key === 'Enter' && !e.shiftKey) {

        sendAgentMessage();
      }

    function renderAgentChatBubble(role, html) {
      const container = document.getElementById('agent-chat-messages');

      msgDiv.className = `agent-chat-msg ${role}`;

    async function sendAgentMessage() {
      const input = document.getElementById('agent-chat-input');
      const sendBtn = document.getElementById('agent-chat-send-btn');
      if (!input || !sendBtn || input.disabled || !_editorState.sandboxId) return;

      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;

      // Add to local history and UI
      _editorState.agentChatHistory.push({ role: 'human', content: text });
      renderAgentChatBubble('human', escapeHtml(text).replace(/\\n/g, '<br/>'));

      const loadingBubble = renderAgentChatBubble('ai', '<span class="spinner"></span> Thinking...');

      try {
        // Create a dedicated thread for the agent chat request
        const threadRes = await fetch(`${API_BASE}/threads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const thread = await threadRes.json();

        // payload is { action: "chat", sandbox_id: "...", chat_messages: [...] }
        const payload = {
          action: 'chat',
          sandbox_id: _editorState.sandboxId,
          chat_messages: _editorState.agentChatHistory
        };

        const runRes = await fetch(`${API_BASE}/threads/${thread.thread_id}/runs/wait`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'sandbox_agent',
            input: {
              messages: [{
                role: 'human',
                content: JSON.stringify(payload)
              }]
            }
          })
        });

        if (!runRes.ok) {
          throw new Error('Failed to run agent sandbox request');
        }

        const result = await runRes.json();

        // Parse the sandbox response
        const aiMsgs = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMsgs[aiMsgs.length - 1];

        if (!lastAi || !lastAi.content) {
          console.error("Missing AI message content in result:", result);
          if (result.error) {
            throw new Error(`Execution failed: ${result.error}`);
          }
          throw new Error('No response from sandbox agent');
        }

        const sandboxResult = parseJsonFromAiContent(lastAi.content);

        // Update LangSmith trace pane with structured data when available.
        if (sandboxResult.trace_url || sandboxResult.trace_data) {
          updateLangSmithTrace({
            trace_url: sandboxResult.trace_url,
            trace_data: sandboxResult.trace_data
          });
        }

        // Render debug steps if they occurred
        if (sandboxResult.steps && Array.isArray(sandboxResult.steps)) {
          for (const step of sandboxResult.steps) {
            const isDebug = step.action === 'debug_fix' || step.action === 'chat_debug_fix';
            const isRewrite = step.action === 'rewrite_files';
            const isFixDeps = step.action === 'install_fix_deps';

            if (isDebug) termLog(`⟳ ${step.command || step.action}`, 'term-info');
            else if (isRewrite) termLog(`✏ ${step.command || step.action}`, 'term-info');
            else if (isFixDeps) termLog(`📦 ${step.command || step.action}`, 'term-info');
            else termLog(`⟫ ${step.command || step.action}`, 'term-cmd');

            if (step.stdout) termLog(step.stdout);
            if (step.stderr) termLog(step.stderr, 'term-err');
            if (step.exit_code !== undefined && step.exit_code !== 0) {
              termLog(`✗ Exit code: ${step.exit_code}`, 'term-err');
            }
          }
        }

        if (sandboxResult.error) {
          if (sandboxResult.error.includes("evicted by E2B") || sandboxResult.error.includes("Paused sandbox") || sandboxResult.error.includes("not found")) {
            termLog('⟲ Sandbox was paused or evicted due to inactivity. Waking up...', 'term-info');
            _editorState.sandboxId = null;
            await runInSandbox();

            // Retry the chat request now that we have a fresh sandbox
            loadingBubble.remove();
            _editorState.agentChatHistory.pop();
            const chatContainer = document.getElementById('agent-chat-messages');
            if (chatContainer && chatContainer.lastChild) {
              chatContainer.removeChild(chatContainer.lastChild);
            }
            input.value = text;
            input.disabled = false;
            sendBtn.disabled = false;
            return sendAgentMessage();
          }

          termLog(`✗ Chat Error: ${sandboxResult.error}`, 'term-err');
          if (sandboxResult.stderr) {
            termLog(`--- Stack Trace ---\n${sandboxResult.stderr}\n-------------------`, 'term-err');
          }
          throw new Error('Agent crashed. Check terminal for details.');
        }

        // Successfully got message back from the sandbox model
        const agentResponse = sandboxResult.message;
        if (!agentResponse) {
          throw new Error('Sandbox returned empty message object');
        }

        // Add trace info to the response so it gets saved to history
        if (sandboxResult.trace_url) agentResponse.trace_url = sandboxResult.trace_url;
        if (sandboxResult.trace_data) agentResponse.trace_data = sandboxResult.trace_data;

        // Add to history and update UI
        _editorState.agentChatHistory.push(agentResponse);
        const mdHtml = marked.parse(agentResponse.content || '*(empty response)*');

        let traceBtnHtml = '';
        if (sandboxResult.trace_url || sandboxResult.trace_data) {
          const traceObj = {
            trace_url: sandboxResult.trace_url,
            trace_data: sandboxResult.trace_data
          };
          // Encode safely for HTML attribute
          const b64Trace = btoa(unescape(encodeURIComponent(JSON.stringify(traceObj))));
          traceBtnHtml = `<button class="msg-trace-btn" onclick="openTracePane('${b64Trace}')" title="View LangSmith Trace">🛠️ Trace</button>`;
        }

        loadingBubble.innerHTML = `<div class="agent-chat-bubble" style="position: relative;">${mdHtml}${traceBtnHtml}</div>`;
        saveCurrentSession();

      } catch (err) {
        console.error('Agent chat error:', err);
        loadingBubble.innerHTML = `<div class="agent-chat-bubble" style="color:var(--error)">Error: ${err.message}</div>`;
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        const container = document.getElementById('agent-chat-messages');
        if (container) container.scrollTop = container.scrollHeight;
      }
    }

    // ═══════════════════════════════════════════════════════
    // Deploy button handler — calls deploy_agent then opens editor
    // ═══════════════════════════════════════════════════════

    async function deploySample(btn) {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';

      try {
        const messages = collectConversationMessages();
        if (messages.length === 0) {
          showError('No conversation to generate from.');
          return;
        }

        // 1) Discard any previous session and open the modal with empty files (generating state)
        discardEditor();
        showEditor('Agent', 'Generating…', []);

        // 2) Create a separate thread for deploy_agent
        const threadRes = await fetch(`${API_BASE}/threads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const thread = await threadRes.json();

        // Build context message from conversation
        const contextSummary = messages.map(m =>
          `${m.role === 'human' ? 'USER' : 'ASSISTANT'}: ${m.content.slice(0, 500)}`
        ).join('\n\n');

        termLog('⟫ Calling deploy agent...', 'term-cmd');

        // Call deploy_agent (wait, not stream)
        const runRes = await fetch(`${API_BASE}/threads/${thread.thread_id}/runs/wait`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'deploy_agent',
            input: {
              messages: [{
                role: 'human',
                content: `Generate a LangGraph agent based on this conversation:\n\n${contextSummary}`
              }]
            }
          })
        });

        if (!runRes.ok) throw new Error(`API error: ${runRes.status}`);

        const result = await runRes.json();

        // Extract the AI response text
        const aiMessages = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMessages[aiMessages.length - 1];
        if (!lastAi || !lastAi.content) throw new Error('No response from deploy agent');

        // Parse the JSON from the response
        console.log('Deploy agent raw content type:', typeof lastAi.content, Array.isArray(lastAi.content) ? 'array' : '');
        console.log('Deploy agent raw content (first 500):', typeof lastAi.content === 'string' ? lastAi.content.slice(0, 500) : JSON.stringify(lastAi.content).slice(0, 500));
        termLog('⟫ Parsing deploy agent response...', 'term-cmd');
        const codeSpec = parseJsonFromAiContent(lastAi.content);

        if (!codeSpec.files || !Array.isArray(codeSpec.files)) {
          throw new Error('Invalid response format — no files array');
        }

        // 3) Update the modal header with the real agent name
        const headerH2 = _editorState.overlay?.querySelector('.code-modal-header h2');
        if (headerH2) {
          headerH2.textContent = `${codeSpec.agent_name || 'generated_agent'} — ${codeSpec.description || 'Generated LangGraph Agent'}`;
        }
        _editorState.agentName = codeSpec.agent_name || 'generated_agent';
        _editorState.description = codeSpec.description || 'Generated LangGraph Agent';

        // 4) Stagger files in one-by-one with a visual delay
        termLog('✓ Files generated:', 'term-info');
        for (let i = 0; i < codeSpec.files.length; i++) {
          addFileToEditor(codeSpec.files[i]);
          // Small delay between files for visual effect (skip for last file)
          if (i < codeSpec.files.length - 1) {
            await new Promise(r => setTimeout(r, 150));
          }
        }

        // Update status from generating to ready-ish before auto-run
        const dot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        if (dot) dot.className = 'status-dot idle';
        if (statusText) statusText.textContent = 'Files ready';

        // 5) Auto-run the sandbox (no manual click needed)
        termLog('', '');

        // Reset the deploy button state BEFORE sandbox creation so it is not saved as disabled in history
        btn.disabled = false;
        btn.innerHTML = 'Deploy';

        await runInSandbox();
        saveCurrentSession();

      } catch (err) {
        console.error('Deploy error:', err);
        termLog(`✗ ${err.message}`, 'term-err');
        showError(`Deploy failed: ${err.message}`);
        // Update modal status if it's open
        const dot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        if (dot) dot.className = 'status-dot stopped';
        if (statusText) statusText.textContent = 'Failed';
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Deploy';
      }
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      // Show user message
      addMessageRow('user', escapeHtml(text));

      // Show thinking indicator
      addThinking();

      try {
        // Create thread if needed
        if (!threadId) {
          threadId = await createThread();
        }

        // Collect conversation context for the monitor agent
        const priorMessages = collectConversationMessages();
        // Add the current user message to the context
        priorMessages.push({ role: 'human', content: text });

        // Build a summary of last few messages for monitor (keep it lean)
        const monitorContext = priorMessages.slice(-6).map(m =>
          `${m.role === 'human' ? 'USER' : 'ASSISTANT'}: ${m.content.slice(0, 300)}`
        ).join('\n\n');

        // --- Fire BOTH requests in parallel ---

        // 1) Stream the docs_agent response
        const streamPromise = fetch(`${API_BASE}/threads/${threadId}/runs/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'docs_agent',
            input: {
              messages: [{ role: 'human', content: text }]
            },
            stream_mode: ['messages'],
            stream_subgraphs: false
          })
        });

        // 2) Monitor agent (separate thread, non-streaming)
        const monitorPromise = (async () => {
          try {
            const monitorThread = await createThread();
            const monitorRes = await fetch(`${API_BASE}/threads/${monitorThread}/runs/wait`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                assistant_id: 'intent_monitor',
                input: {
                  messages: [{
                    role: 'human',
                    content: `Classify this conversation:\n\n${monitorContext}`
                  }]
                }
              })
            });
            if (!monitorRes.ok) return { deployable: false };
            const monitorResult = await monitorRes.json();
            // Extract the AI response and parse the JSON verdict
            const aiMsgs = (monitorResult.messages || []).filter(m => m.type === 'ai');
            const lastMsg = aiMsgs[aiMsgs.length - 1];
            if (!lastMsg || !lastMsg.content) return { deployable: false };
            return parseJsonFromAiContent(lastMsg.content);
          } catch (err) {
            console.warn('Monitor agent error:', err);
            return { deployable: false };
          }
        })();

        // Wait for the stream response to start
        const res = await streamPromise;

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`API error (${res.status}): ${errText}`);
        }

        let thinkingRemoved = false;

        let aiBody = null;
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let currentEvent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
              continue;
            }
            if (line === '') {
              currentEvent = '';
              continue;
            }
            if (!line.startsWith('data: ')) continue;

            const data = line.slice(6);
            if (data === '[DONE]') continue;

            // Only process message stream events
            if (currentEvent !== 'messages/partial') continue;

            try {
              const parsed = JSON.parse(data);
              // messages/partial sends an array with one message object
              const msgChunk = Array.isArray(parsed) ? parsed[0] : parsed;
              if (!msgChunk) continue;

              // Tool call in-progress (AI deciding which tool to call)
              if (msgChunk.tool_calls && msgChunk.tool_calls.length > 0) {
                if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
                for (const tc of msgChunk.tool_calls) {
                  const toolName = tc.name || tc.function?.name;
                  if (!toolName) continue;
                  const toolKey = `tool-${toolName}`;
                  if (!aiBody) aiBody = addMessageRow('ai', '');
                  if (!aiBody.querySelector(`[data-tool="${toolKey}"]`)) {
                    const toolDiv = document.createElement('div');
                    toolDiv.className = 'tool-call';
                    toolDiv.dataset.tool = toolKey;
                    toolDiv.innerHTML = `<span class="tool-icon">🔧</span> Searching: ${escapeHtml(toolName)}`;
                    const toolContainer = aiBody.querySelector('.tool-calls');
                    if (toolContainer) {
                      toolContainer.appendChild(toolDiv);
                    } else {
                      aiBody.prepend(toolDiv);
                    }
                    scrollToBottom();
                  }
                }
              }

              // AI text content
              if (msgChunk.type === 'ai' || msgChunk.type === 'AIMessageChunk') {
                const content = msgChunk.content;
                if (content && typeof content === 'string' && content.length > 0) {
                  if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
                  if (!aiBody) aiBody = addMessageRow('ai', '');
                  fullText = content;
                  // Re-render only the text portion (after any tool-call divs)
                  let textNode = aiBody.querySelector('.ai-text');
                  if (!textNode) {
                    textNode = document.createElement('div');
                    textNode.className = 'ai-text';
                    aiBody.appendChild(textNode);
                  }
                  textNode.innerHTML = marked.parse(fullText);
                  scrollToBottom();
                }
              }
            } catch (e) {
              // Ignore parse errors
            }
          }
        }

        // Final render
        if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
        if (!aiBody && !fullText) {
          addMessageRow('ai', '<span style="color:var(--text-muted)">No response received.</span>');
        }

        // --- Wait for monitor verdict and conditionally show Deploy button ---
        const verdict = await monitorPromise;
        console.log('Monitor verdict:', verdict);

        if (verdict.deployable && aiBody) {
          // Find or create msg-actions container inside this AI message
          let actionsDiv = aiBody.querySelector('.msg-actions');
          if (!actionsDiv) {
            actionsDiv = document.createElement('div');
            actionsDiv.className = 'msg-actions';
            aiBody.appendChild(actionsDiv);
          }
          const deployBtn = document.createElement('button');
          deployBtn.className = 'deploy-btn';
          deployBtn.onclick = function () { deploySample(this); };
          deployBtn.textContent = `Deploy`;
          deployBtn.style.animation = 'fadeIn 0.3s ease';
          actionsDiv.appendChild(deployBtn);
          scrollToBottom();
        }

      } catch (err) {
        removeThinking();
        console.error('Stream error:', err);
        showError(err.message || 'Failed to connect to the API.');
        addMessageRow('ai', `<span style="color:var(--error)">Error: ${escapeHtml(err.message)}</span>`);
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
        scrollToBottom();
        saveCurrentSession();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Focus input on load
    document.getElementById('input').focus();
  </script>
</body>
