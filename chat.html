<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat LangChain — Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- CodeMirror 6 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@codemirror/state@6/dist/index.cjs.js" type="module"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/shell/shell.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/toml/toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a28;
      --bg-input: #1e1e2e;
      --surface: #232336;
      --border: #2a2a40;
      --border-focus: #6c63ff;
      --text-primary: #e8e8f0;
      --text-secondary: #9494b0;
      --text-muted: #6a6a85;
      --accent: #6c63ff;
      --accent-hover: #7b73ff;
      --accent-glow: rgba(108, 99, 255, 0.25);
      --user-bubble: linear-gradient(135deg, #6c63ff 0%, #5a4fff 100%);
      --ai-bubble: #1a1a28;
      --success: #4ecdc4;
      --error: #ff6b6b;
      --code-bg: #0d0d17;
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ───── Header ───── */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--user-bubble);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #e8e8f0, #9494b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(78, 205, 196, 0.12);
      color: var(--success);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .header-spacer {
      flex: 1;
    }

    .new-chat-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-chat-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108, 99, 255, 0.06);
    }

    /* ───── Messages Area ───── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .message-row {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar-user {
      background: var(--user-bubble);
      color: #fff;
      font-weight: 600;
    }

    .avatar-ai {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .msg-content {
      flex: 1;
      min-width: 0;
    }

    .msg-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .msg-body {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .msg-body p {
      margin-bottom: 12px;
    }

    .msg-body p:last-child {
      margin-bottom: 0;
    }

    .msg-body ul,
    .msg-body ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .msg-body li {
      margin-bottom: 4px;
    }

    .msg-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .msg-body a:hover {
      text-decoration: underline;
    }

    .msg-body code {
      background: var(--code-bg);
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      border: 1px solid var(--border);
    }

    .msg-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .msg-body pre code {
      background: none;
      padding: 0;
      border: none;
      font-size: 13px;
    }

    /* ───── Thinking Indicator ───── */
    .thinking {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 16px;
      min-width: 64px;
    }

    .thinking-dots {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .thinking-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      animation: wave 1.2s ease-in-out infinite;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes wave {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }

      50% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }

    /* ───── Welcome ───── */
    .welcome {
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
      padding: 0 24px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: var(--user-bubble);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .welcome h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #e8e8f0, #b0b0d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .suggestion {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text-primary);
      background: rgba(108, 99, 255, 0.06);
      transform: translateY(-1px);
    }

    /* ───── Input Area ───── */
    .input-area {
      flex-shrink: 0;
      padding: 16px 24px 24px;
      background: var(--bg-primary);
    }

    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      position: relative;
    }

    .input-box textarea {
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 200px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-box textarea::placeholder {
      color: var(--text-muted);
    }

    .input-box textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      border: none;
      background: var(--user-bubble);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--accent-glow);
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ───── Error Toast ───── */
    .error-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a1520;
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 100;
      animation: fadeIn 0.3s ease;
      max-width: 500px;
    }

    /* ───── Tool Calls ───── */
    .tool-call {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(108, 99, 255, 0.08);
      border: 1px solid rgba(108, 99, 255, 0.15);
      border-radius: 8px;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .tool-call .tool-icon {
      font-size: 14px;
    }

    .tool-calls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* ───── Message Actions ───── */
    .msg-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
    }

    .deploy-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(108, 99, 255, 0.35);
      background: rgba(108, 99, 255, 0.12);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .deploy-btn:hover {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.2);
      color: #fff;
      box-shadow: 0 6px 16px rgba(108, 99, 255, 0.18);
    }

    .deploy-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .deploy-btn .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ───── Code Editor Modal ───── */
    .code-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .code-modal {
      width: 94vw;
      max-width: 1100px;
      height: 90vh;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .code-modal-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(10, 10, 15, 0.5);
    }

    .code-modal-header h2 {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      background: linear-gradient(135deg, #e8e8f0, #9494b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sandbox-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .sandbox-status .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .sandbox-status .status-dot.creating {
      background: #f0ad4e;
      animation: pulse 1s infinite;
    }

    .sandbox-status .status-dot.running {
      background: var(--success);
    }

    .sandbox-status .status-dot.idle {
      background: var(--accent);
    }

    .sandbox-status .status-dot.stopped {
      background: var(--error);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .run-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #4ecdc4, #44b8b0);
      color: #0a0a0f;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .run-btn:hover {
      background: linear-gradient(135deg, #5dd8d0, #4ecdc4);
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.3);
      transform: translateY(-1px);
    }

    .run-btn:disabled {
      opacity: 0.5;
      cursor: wait;
      transform: none;
    }

    .run-btn .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(10, 10, 15, 0.3);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .download-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .download-btn:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .code-modal-header .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .code-modal-header .close-btn:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .code-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      padding: 0 12px;
      background: rgba(10, 10, 15, 0.3);
    }

    .code-tab {
      padding: 10px 16px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .code-tab:hover {
      color: var(--text-secondary);
    }

    .code-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .code-file-info {
      padding: 6px 20px;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .copy-btn {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--success);
      color: var(--success);
    }

    /* Editor + Terminal split */
    .editor-split {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .editor-pane {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .editor-pane .CodeMirror {
      height: 100%;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      border: none;
    }

    .terminal-resize-bar {
      height: 4px;
      background: var(--border);
      cursor: ns-resize;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .terminal-resize-bar:hover {
      background: var(--accent);
    }

    .terminal-pane {
      height: 200px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      background: #0a0a0f;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid rgba(42, 42, 64, 0.5);
      background: rgba(10, 10, 15, 0.8);
    }

    .terminal-header span {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .terminal-clear-btn {
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .terminal-clear-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .terminal-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #c8c8d8;
    }

    .terminal-body .term-line {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .terminal-body .term-line.term-cmd {
      color: var(--success);
    }

    .terminal-body .term-line.term-err {
      color: var(--error);
    }

    .terminal-body .term-line.term-info {
      color: var(--accent);
    }

    .terminal-body .term-line.term-system {
      color: var(--text-muted);
      font-style: italic;
    }

    /* ───── Agent Chat Sidebar ───── */
    .modal-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .editor-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    .agent-sidebar {
      width: 380px;
      display: flex;
      flex-direction: column;
      background: var(--bg-tertiary);
      flex-shrink: 0;
    }

    .agent-sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 10, 15, 0.4);
    }

    .agent-sidebar-header .icon {
      color: var(--accent);
    }

    .agent-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-chat-msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 90%;
    }

    .agent-chat-msg.human {
      align-self: flex-end;
    }

    .agent-chat-msg.ai {
      align-self: flex-start;
    }

    .agent-chat-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .agent-chat-msg.human .agent-chat-bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .agent-chat-msg.ai .agent-chat-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .agent-chat-bubble pre {
      background: rgba(0, 0, 0, 0.2) !important;
      padding: 8px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .agent-chat-bubble code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
    }

    .agent-chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      background: rgba(10, 10, 15, 0.3);
    }

    .agent-chat-input-wrapper {
      position: relative;
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      transition: border-color 0.2s;
    }

    .agent-chat-input-wrapper:focus-within {
      border-color: var(--border-focus);
    }

    .agent-chat-input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      outline: none;
      min-height: 20px;
      max-height: 120px;
    }

    .agent-chat-input-wrapper textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .agent-chat-send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 2px;
      margin-right: 2px;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .agent-chat-send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .agent-chat-send-btn:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .chat-overlay-msg {
      position: absolute;
      inset: 0;
      background: rgba(26, 26, 40, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      z-index: 10;
      border-radius: 0 0 16px 0;
    }

    @media (max-width: 600px) {
      .suggestions {
        grid-template-columns: 1fr;
      }

      .welcome h1 {
        font-size: 22px;
      }

      .header-badge {
        display: none;
      }

      .code-modal {
        width: 98vw;
        height: 90vh;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">🦜</div>
    <div class="header-title">Chat LangChain</div>
    <div class="header-badge">● Local Dev</div>
    <div class="header-spacer"></div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🦜</div>
      <h1>Chat LangChain</h1>
      <p>Ask anything about LangChain, LangGraph, LangSmith, and building AI applications.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="askSuggestion(this)">How do I create a simple LangGraph agent?</button>
        <button class="suggestion" onclick="askSuggestion(this)">What is the difference between LangChain and
          LangGraph?</button>
        <button class="suggestion" onclick="askSuggestion(this)">How do I add memory to my chatbot?</button>
        <button class="suggestion" onclick="askSuggestion(this)">Show me how to use tool calling with OpenAI</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-box">
        <textarea id="input" placeholder="Ask about LangChain, LangGraph, LangSmith..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:2024';
    let threadId = null;
    let isStreaming = false;

    // Auto-resize textarea
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function askSuggestion(btn) {
      document.getElementById('input').value = btn.textContent;
      sendMessage();
    }

    async function newChat() {
      threadId = null;
      document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🦜</div>
        <h1>Chat LangChain</h1>
        <p>Ask anything about LangChain, LangGraph, LangSmith, and building AI applications.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="askSuggestion(this)">How do I create a simple LangGraph agent?</button>
          <button class="suggestion" onclick="askSuggestion(this)">What is the difference between LangChain and LangGraph?</button>
          <button class="suggestion" onclick="askSuggestion(this)">How do I add memory to my chatbot?</button>
          <button class="suggestion" onclick="askSuggestion(this)">Show me how to use tool calling with OpenAI</button>
        </div>
      </div>`;
    }

    async function createThread() {
      const res = await fetch(`${API_BASE}/threads`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
      });
      if (!res.ok) throw new Error('Failed to create thread');
      const data = await res.json();
      return data.thread_id;
    }

    function addMessageRow(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const row = document.createElement('div');
      row.className = 'message-row';

      const isUser = role === 'user';
      const bodyHtml = isUser
        ? `${content}`
        : `
        <div class="tool-calls"></div>
        <div class="ai-text">${content}</div>
      `;
      row.innerHTML = `
      <div class="avatar ${isUser ? 'avatar-user' : 'avatar-ai'}">
        ${isUser ? 'U' : '🦜'}
      </div>
      <div class="msg-content">
        <div class="msg-label">${isUser ? 'You' : 'LangChain Assistant'}</div>
        <div class="msg-body">${bodyHtml}</div>
      </div>`;

      document.getElementById('messages').appendChild(row);
      scrollToBottom();
      return row.querySelector('.msg-body');
    }

    function addThinking() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const row = document.createElement('div');
      row.className = 'message-row';
      row.id = 'thinking-row';
      row.innerHTML = `
      <div class="avatar avatar-ai">🦜</div>
      <div class="msg-content">
        <div class="msg-label">LangChain Assistant</div>
        <div class="msg-body">
          <div class="thinking">
            <div class="thinking-dots"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>`;
      document.getElementById('messages').appendChild(row);
      scrollToBottom();
    }

    function removeThinking() {
      const el = document.getElementById('thinking-row');
      if (el) el.remove();
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showError(msg) {
      const existing = document.querySelector('.error-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'error-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    function extractTextFromContent(content) {
      if (typeof content === 'string') return content;
      if (Array.isArray(content)) {
        return content.map(part => {
          if (!part) return '';
          if (typeof part === 'string') return part;
          if (typeof part.text === 'string') return part.text;
          if (typeof part.content === 'string') return part.content;
          return '';
        }).join('');
      }
      if (content && typeof content === 'object') {
        if (typeof content.text === 'string') return content.text;
        if (typeof content.content === 'string') return content.content;
      }
      return '';
    }

    function unescapeJsonish(text) {
      return text
        .replace(/\\\\\\\\/g, '\\\\')
        .replace(/\\\\n/g, '\n')
        .replace(/\\\\r/g, '\r')
        .replace(/\\\\t/g, '\t')
        .replace(/\\\\\"/g, '"');
    }

    function parseJsonFromText(text) {
      const raw = (text || '').trim();
      if (!raw) throw new Error('Empty response');

      const match = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
      const candidate = (match ? match[1] : raw).trim();

      try {
        return JSON.parse(candidate);
      } catch { }

      try {
        return JSON.parse(raw);
      } catch { }

      if (/\\\\[nrt"]/.test(candidate)) {
        try {
          return JSON.parse(unescapeJsonish(candidate));
        } catch { }
      }

      if (/\\\\[nrt"]/.test(raw)) {
        try {
          return JSON.parse(unescapeJsonish(raw));
        } catch { }
      }

      throw new Error('Invalid JSON from agent');
    }

    function parseJsonFromAiContent(content) {
      return parseJsonFromText(extractTextFromContent(content));
    }

    // Collect all conversation messages from the DOM
    function collectConversationMessages() {
      const rows = document.querySelectorAll('.message-row');
      const messages = [];
      for (const row of rows) {
        const label = row.querySelector('.msg-label');
        if (!label) continue;
        const isUser = label.textContent.trim() === 'You';
        const textEl = row.querySelector('.ai-text') || row.querySelector('.msg-body');
        const text = textEl ? textEl.textContent.trim() : '';
        if (!text) continue;
        messages.push({ role: isUser ? 'human' : 'assistant', content: text });
      }
      return messages;
    }

    // ═══════════════════════════════════════════════════════
    // Code Editor Modal (CodeMirror + Terminal + E2B Sandbox)
    // ═══════════════════════════════════════════════════════

    // Global editor state
    let _editorState = {
      files: [],          // {filename, description, content} — mutable
      editors: {},        // filename -> CodeMirror instance
      activeIdx: 0,
      sandboxId: null,
      sandboxStatus: 'idle',  // idle | creating | running | stopped
      overlay: null,
      agentName: '',
      description: '',
      agentChatHistory: [], // Store chat history for the side agent
    };

    function showEditor(agentName, description, files) {
      // Clean up previous editor if open
      if (_editorState.overlay) _editorState.overlay.remove();

      // Clone files so we can mutate content
      _editorState.files = files.map(f => ({ ...f }));
      _editorState.editors = {};
      _editorState.activeIdx = 0;
      _editorState.sandboxId = null;
      _editorState.sandboxStatus = 'idle';
      _editorState.agentName = agentName;
      _editorState.description = description;
      _editorState.agentChatHistory = [];

      const overlay = document.createElement('div');
      overlay.className = 'code-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) closeEditor(); };
      _editorState.overlay = overlay;

      overlay.innerHTML = `
      <div class="code-modal">
        <div class="code-modal-header">
          <h2>${escapeHtml(agentName)} — ${escapeHtml(description)}</h2>
          <div class="sandbox-status" id="sandbox-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Ready</span>
          </div>
          <div class="header-actions">
            <button class="run-btn" id="run-sandbox-btn" onclick="runInSandbox()">▶ Run in Sandbox</button>
            <button class="download-btn" onclick="downloadAllFiles()">↓ Download</button>
          </div>
          <button class="close-btn" onclick="closeEditor()">&times;</button>
        </div>
        
        <div class="modal-layout">
          <div class="editor-section">
            <div class="code-tabs" id="editor-tabs"></div>
            <div class="code-file-info" id="editor-file-info">
              <span></span>
              <button class="copy-btn" onclick="copyCurrentFile()">Copy</button>
            </div>
            <div class="editor-split">
              <div class="editor-pane" id="editor-pane"></div>
              <div class="terminal-resize-bar" id="terminal-resize-bar"></div>
              <div class="terminal-pane" id="terminal-pane">
                <div class="terminal-header">
                  <span>Terminal</span>
                  <button class="terminal-clear-btn" onclick="clearTerminal()">Clear</button>
                </div>
                <div class="terminal-body" id="terminal-body">
                  <div class="term-line term-system">Ready — click "Run in Sandbox" to deploy and execute your agent</div>
                </div>
              </div>
            </div>
          </div>
          
          <div class="agent-sidebar">
            <div class="agent-sidebar-header">
              <span class="icon">🤖</span> Test Agent
            </div>
            <div style="position: relative; flex: 1; display: flex; flex-direction: column; min-height: 0;">
              <div id="agent-chat-overlay" class="chat-overlay-msg">
                <div>Deploy and run the agent in the sandbox first to chat with it.</div>
              </div>
              <div class="agent-chat-messages" id="agent-chat-messages">
                <div class="agent-chat-msg ai">
                  <div class="agent-chat-bubble">I am ready! Start a conversation with me.</div>
                </div>
              </div>
              <div class="agent-chat-input-area">
                <div class="agent-chat-input-wrapper">
                  <textarea id="agent-chat-input" placeholder="Message the agent..." rows="1" disabled
                    onkeydown="handleAgentChatKey(event)" oninput="autoResize(this)"></textarea>
                  <button class="agent-chat-send-btn" id="agent-chat-send-btn" onclick="sendAgentMessage()" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;

      document.body.appendChild(overlay);

      // Render tabs
      renderEditorTabs();
      // Open first file
      openFileInEditor(0);
      // Setup terminal resize
      setupTerminalResize();
    }

    function closeEditor() {
      if (_editorState.overlay) {
        // Save all editor contents back to files array
        saveAllEditors();
        _editorState.overlay.remove();
        _editorState.overlay = null;
        _editorState.editors = {};
      }
    }

    function renderEditorTabs() {
      const tabsEl = document.getElementById('editor-tabs');
      if (!tabsEl) return;
      tabsEl.innerHTML = _editorState.files.map((f, i) =>
        `<button class="code-tab ${i === _editorState.activeIdx ? 'active' : ''}" onclick="openFileInEditor(${i})">${escapeHtml(f.filename)}</button>`
      ).join('');
    }

    function openFileInEditor(idx) {
      // Save current editor content
      saveCurrentEditor();

      _editorState.activeIdx = idx;
      const file = _editorState.files[idx];

      // Update tabs
      renderEditorTabs();

      // Update file info
      const infoEl = document.getElementById('editor-file-info');
      if (infoEl) {
        infoEl.querySelector('span').textContent = file.description || file.filename;
      }

      // Get or create CodeMirror instance
      const pane = document.getElementById('editor-pane');
      if (!pane) return;
      pane.innerHTML = '';

      const ext = file.filename.split('.').pop();
      const modeMap = {
        py: 'python', json: { name: 'javascript', json: true },
        js: 'javascript', toml: 'toml', md: 'markdown',
        txt: 'text', env: 'shell', example: 'shell', sh: 'shell',
      };

      const textarea = document.createElement('textarea');
      pane.appendChild(textarea);

      const cm = CodeMirror.fromTextArea(textarea, {
        value: file.content,
        mode: modeMap[ext] || 'text',
        theme: 'material-darker',
        lineNumbers: true,
        lineWrapping: false,
        tabSize: 4,
        indentWithTabs: false,
        autofocus: true,
        viewportMargin: Infinity,
      });

      cm.setValue(file.content);
      _editorState.editors[file.filename] = cm;

      // Refresh after DOM settles
      setTimeout(() => cm.refresh(), 50);
    }

    function saveCurrentEditor() {
      const file = _editorState.files[_editorState.activeIdx];
      if (file && _editorState.editors[file.filename]) {
        file.content = _editorState.editors[file.filename].getValue();
      }
    }

    function saveAllEditors() {
      for (const file of _editorState.files) {
        if (_editorState.editors[file.filename]) {
          file.content = _editorState.editors[file.filename].getValue();
        }
      }
    }

    function copyCurrentFile() {
      saveCurrentEditor();
      const file = _editorState.files[_editorState.activeIdx];
      if (!file) return;
      navigator.clipboard.writeText(file.content).then(() => {
        const btn = _editorState.overlay?.querySelector('.copy-btn');
        if (btn) {
          btn.textContent = 'Copied!';
          btn.style.color = 'var(--success)';
          btn.style.borderColor = 'var(--success)';
          setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
        }
      }).catch(() => { });
    }

    function downloadAllFiles() {
      saveAllEditors();
      // Download each file individually (no zip library needed)
      for (const file of _editorState.files) {
        const blob = new Blob([file.content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.filename;
        a.click();
        URL.revokeObjectURL(url);
      }
    }

    // ── Terminal helpers ──
    function termLog(text, cls = '') {
      const body = document.getElementById('terminal-body');
      if (!body) return;
      const line = document.createElement('div');
      line.className = 'term-line' + (cls ? ` ${cls}` : '');
      line.textContent = text;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
    }

    function clearTerminal() {
      const body = document.getElementById('terminal-body');
      if (body) body.innerHTML = '';
    }

    function updateSandboxStatus(status, label) {
      _editorState.sandboxStatus = status;
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (dot) { dot.className = 'status-dot ' + status; }
      if (text) { text.textContent = label || status; }

      // Enable/disable chat sidebar based on running status
      const overlay = document.getElementById('agent-chat-overlay');
      const input = document.getElementById('agent-chat-input');
      const sendBtn = document.getElementById('agent-chat-send-btn');

      if (overlay) overlay.style.display = status === 'running' ? 'none' : 'flex';
      if (input) input.disabled = status !== 'running';
      if (sendBtn) sendBtn.disabled = status !== 'running';
    }

    // ── Terminal resize drag ──
    function setupTerminalResize() {
      const bar = document.getElementById('terminal-resize-bar');
      const terminal = document.getElementById('terminal-pane');
      const editor = document.getElementById('editor-pane');
      if (!bar || !terminal || !editor) return;

      let startY, startH;
      bar.addEventListener('mousedown', (e) => {
        startY = e.clientY;
        startH = terminal.offsetHeight;
        const onMove = (e2) => {
          const delta = startY - e2.clientY;
          terminal.style.height = Math.max(80, startH + delta) + 'px';
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          // Refresh active editor
          const file = _editorState.files[_editorState.activeIdx];
          if (file && _editorState.editors[file.filename]) {
            _editorState.editors[file.filename].refresh();
          }
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    // ═══════════════════════════════════════════════════════
    // E2B Sandbox Integration
    // ═══════════════════════════════════════════════════════

    async function runInSandbox() {
      const runBtn = document.getElementById('run-sandbox-btn');
      if (!runBtn || runBtn.disabled) return;

      saveAllEditors();

      runBtn.disabled = true;
      runBtn.innerHTML = '<span class="spinner"></span> Running...';

      try {
        updateSandboxStatus('creating', 'Creating sandbox...');
        termLog('⟫ Creating E2B sandbox...', 'term-cmd');

        // Create a thread for sandbox_agent
        const threadRes = await fetch(`${API_BASE}/threads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const thread = await threadRes.json();

        // Call sandbox_agent with create + files
        const createRes = await fetch(`${API_BASE}/threads/${thread.thread_id}/runs/wait`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'sandbox_agent',
            input: {
              messages: [{
                role: 'human',
                content: JSON.stringify({
                  action: 'create_and_run',
                  files: _editorState.files.map(f => ({
                    filename: f.filename,
                    content: f.content
                  }))
                })
              }]
            }
          })
        });

        if (!createRes.ok) {
          const errText = await createRes.text();
          throw new Error(`Sandbox API error (${createRes.status}): ${errText.slice(0, 200)}`);
        }

        const result = await createRes.json();

        // Parse the sandbox response
        const aiMsgs = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMsgs[aiMsgs.length - 1];
        if (!lastAi || !lastAi.content) throw new Error('No response from sandbox agent');

        const sandboxResult = parseJsonFromAiContent(lastAi.content);

        // Display output
        if (sandboxResult.sandbox_id) {
          _editorState.sandboxId = sandboxResult.sandbox_id;
          termLog(`✓ Sandbox created: ${sandboxResult.sandbox_id}`, 'term-info');
        }

        if (sandboxResult.steps && Array.isArray(sandboxResult.steps)) {
          for (const step of sandboxResult.steps) {
            termLog(`⟫ ${step.command || step.action}`, 'term-cmd');
            if (step.stdout) termLog(step.stdout);
            if (step.stderr) termLog(step.stderr, 'term-err');
            if (step.exit_code !== undefined && step.exit_code !== 0) {
              termLog(`✗ Exit code: ${step.exit_code}`, 'term-err');
            }
          }
        }

        if (sandboxResult.output) {
          termLog(sandboxResult.output);
        }

        if (sandboxResult.error) {
          termLog(`✗ Error: ${sandboxResult.error}`, 'term-err');
          updateSandboxStatus('stopped', 'Error');
        } else {
          updateSandboxStatus('running', 'Running');
          termLog('✓ Agent deployed and running!', 'term-info');
        }

      } catch (err) {
        console.error('Sandbox error:', err);
        termLog(`✗ ${err.message}`, 'term-err');
        updateSandboxStatus('stopped', 'Failed');
        showError(`Sandbox error: ${err.message}`);
      } finally {
        runBtn.disabled = false;
        runBtn.innerHTML = _editorState.sandboxId ? '▶ Re-run' : '▶ Run in Sandbox';
      }
    }

    // ═══════════════════════════════════════════════════════
    // Agent Sidebar Chat
    // ═══════════════════════════════════════════════════════

    function handleAgentChatKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendAgentMessage();
      }
    }

    function renderAgentChatBubble(role, html) {
      const container = document.getElementById('agent-chat-messages');
      if (!container) return;

      const msgDiv = document.createElement('div');
      msgDiv.className = `agent-chat-msg ${role}`;
      msgDiv.innerHTML = `<div class="agent-chat-bubble">${html}</div>`;
      container.appendChild(msgDiv);
      container.scrollTop = container.scrollHeight;
      return msgDiv;
    }

    async function sendAgentMessage() {
      const input = document.getElementById('agent-chat-input');
      const sendBtn = document.getElementById('agent-chat-send-btn');
      if (!input || !sendBtn || input.disabled || !_editorState.sandboxId) return;

      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      input.disabled = true;
      sendBtn.disabled = true;

      // Add to local history and UI
      _editorState.agentChatHistory.push({ role: 'human', content: text });
      renderAgentChatBubble('human', escapeHtml(text).replace(/\\n/g, '<br/>'));

      const loadingBubble = renderAgentChatBubble('ai', '<span class="spinner"></span> Thinking...');

      try {
        // Create a dedicated thread for the agent chat request
        const threadRes = await fetch(`${API_BASE}/threads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const thread = await threadRes.json();

        // payload is { action: "chat", sandbox_id: "...", chat_messages: [...] }
        const payload = {
          action: 'chat',
          sandbox_id: _editorState.sandboxId,
          chat_messages: _editorState.agentChatHistory
        };

        const runRes = await fetch(`${API_BASE}/threads/${thread.thread_id}/runs/wait`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'sandbox_agent',
            input: {
              messages: [{
                role: 'human',
                content: JSON.stringify(payload)
              }]
            }
          })
        });

        if (!runRes.ok) {
          throw new Error('Failed to run agent sandbox request');
        }

        const result = await runRes.json();

        // Parse the sandbox response
        const aiMsgs = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMsgs[aiMsgs.length - 1];
        if (!lastAi || !lastAi.content) throw new Error('No response from sandbox agent');

        const sandboxResult = parseJsonFromAiContent(lastAi.content);

        if (sandboxResult.error) {
          throw new Error(sandboxResult.error);
        }

        // Successfully got message back from the sandbox model
        const agentResponse = sandboxResult.message;
        if (!agentResponse) {
          throw new Error('Sandbox returned empty message object');
        }

        // Add to history and update UI
        _editorState.agentChatHistory.push(agentResponse);
        const mdHtml = marked.parse(agentResponse.content || '*(empty response)*');
        loadingBubble.innerHTML = `<div class="agent-chat-bubble">${mdHtml}</div>`;

      } catch (err) {
        console.error('Agent chat error:', err);
        loadingBubble.innerHTML = `<div class="agent-chat-bubble" style="color:var(--error)">Error: ${err.message}</div>`;
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        const container = document.getElementById('agent-chat-messages');
        if (container) container.scrollTop = container.scrollHeight;
      }
    }

    // ═══════════════════════════════════════════════════════
    // Deploy button handler — calls deploy_agent then opens editor
    // ═══════════════════════════════════════════════════════

    async function deploySample(btn) {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';

      try {
        const messages = collectConversationMessages();
        if (messages.length === 0) {
          showError('No conversation to generate from.');
          return;
        }

        // Create a separate thread for deploy_agent
        const threadRes = await fetch(`${API_BASE}/threads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });
        const thread = await threadRes.json();

        // Build context message from conversation
        const contextSummary = messages.map(m =>
          `${m.role === 'human' ? 'USER' : 'ASSISTANT'}: ${m.content.slice(0, 500)}`
        ).join('\n\n');

        // Call deploy_agent (wait, not stream)
        const runRes = await fetch(`${API_BASE}/threads/${thread.thread_id}/runs/wait`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'deploy_agent',
            input: {
              messages: [{
                role: 'human',
                content: `Generate a LangGraph agent based on this conversation:\n\n${contextSummary}`
              }]
            }
          })
        });

        if (!runRes.ok) throw new Error(`API error: ${runRes.status}`);

        const result = await runRes.json();

        // Extract the AI response text
        const aiMessages = (result.messages || []).filter(m => m.type === 'ai');
        const lastAi = aiMessages[aiMessages.length - 1];
        if (!lastAi || !lastAi.content) throw new Error('No response from deploy agent');

        // Parse the JSON from the response
        const codeSpec = parseJsonFromAiContent(lastAi.content);

        if (!codeSpec.files || !Array.isArray(codeSpec.files)) {
          throw new Error('Invalid response format — no files array');
        }

        // Open the code editor (replaces old showCodeViewer)
        showEditor(
          codeSpec.agent_name || 'generated_agent',
          codeSpec.description || 'Generated LangGraph Agent',
          codeSpec.files
        );

      } catch (err) {
        console.error('Deploy error:', err);
        showError(`Deploy failed: ${err.message}`);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Deploy';
      }
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || isStreaming) return;

      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      // Show user message
      addMessageRow('user', escapeHtml(text));

      // Show thinking indicator
      addThinking();

      try {
        // Create thread if needed
        if (!threadId) {
          threadId = await createThread();
        }

        // Collect conversation context for the monitor agent
        const priorMessages = collectConversationMessages();
        // Add the current user message to the context
        priorMessages.push({ role: 'human', content: text });

        // Build a summary of last few messages for monitor (keep it lean)
        const monitorContext = priorMessages.slice(-6).map(m =>
          `${m.role === 'human' ? 'USER' : 'ASSISTANT'}: ${m.content.slice(0, 300)}`
        ).join('\n\n');

        // --- Fire BOTH requests in parallel ---

        // 1) Stream the docs_agent response
        const streamPromise = fetch(`${API_BASE}/threads/${threadId}/runs/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assistant_id: 'docs_agent',
            input: {
              messages: [{ role: 'human', content: text }]
            },
            stream_mode: ['messages'],
            stream_subgraphs: false
          })
        });

        // 2) Monitor agent (separate thread, non-streaming)
        const monitorPromise = (async () => {
          try {
            const monitorThread = await createThread();
            const monitorRes = await fetch(`${API_BASE}/threads/${monitorThread}/runs/wait`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                assistant_id: 'intent_monitor',
                input: {
                  messages: [{
                    role: 'human',
                    content: `Classify this conversation:\n\n${monitorContext}`
                  }]
                }
              })
            });
            if (!monitorRes.ok) return { deployable: false };
            const monitorResult = await monitorRes.json();
            // Extract the AI response and parse the JSON verdict
            const aiMsgs = (monitorResult.messages || []).filter(m => m.type === 'ai');
            const lastMsg = aiMsgs[aiMsgs.length - 1];
            if (!lastMsg || !lastMsg.content) return { deployable: false };
            return parseJsonFromAiContent(lastMsg.content);
          } catch (err) {
            console.warn('Monitor agent error:', err);
            return { deployable: false };
          }
        })();

        // Wait for the stream response to start
        const res = await streamPromise;

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`API error (${res.status}): ${errText}`);
        }

        let thinkingRemoved = false;

        let aiBody = null;
        let fullText = '';

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let currentEvent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
              continue;
            }
            if (line === '') {
              currentEvent = '';
              continue;
            }
            if (!line.startsWith('data: ')) continue;

            const data = line.slice(6);
            if (data === '[DONE]') continue;

            // Only process message stream events
            if (currentEvent !== 'messages/partial') continue;

            try {
              const parsed = JSON.parse(data);
              // messages/partial sends an array with one message object
              const msgChunk = Array.isArray(parsed) ? parsed[0] : parsed;
              if (!msgChunk) continue;

              // Tool call in-progress (AI deciding which tool to call)
              if (msgChunk.tool_calls && msgChunk.tool_calls.length > 0) {
                if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
                for (const tc of msgChunk.tool_calls) {
                  const toolName = tc.name || tc.function?.name;
                  if (!toolName) continue;
                  const toolKey = `tool-${toolName}`;
                  if (!aiBody) aiBody = addMessageRow('ai', '');
                  if (!aiBody.querySelector(`[data-tool="${toolKey}"]`)) {
                    const toolDiv = document.createElement('div');
                    toolDiv.className = 'tool-call';
                    toolDiv.dataset.tool = toolKey;
                    toolDiv.innerHTML = `<span class="tool-icon">🔧</span> Searching: ${escapeHtml(toolName)}`;
                    const toolContainer = aiBody.querySelector('.tool-calls');
                    if (toolContainer) {
                      toolContainer.appendChild(toolDiv);
                    } else {
                      aiBody.prepend(toolDiv);
                    }
                    scrollToBottom();
                  }
                }
              }

              // AI text content
              if (msgChunk.type === 'ai' || msgChunk.type === 'AIMessageChunk') {
                const content = msgChunk.content;
                if (content && typeof content === 'string' && content.length > 0) {
                  if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
                  if (!aiBody) aiBody = addMessageRow('ai', '');
                  fullText = content;
                  // Re-render only the text portion (after any tool-call divs)
                  let textNode = aiBody.querySelector('.ai-text');
                  if (!textNode) {
                    textNode = document.createElement('div');
                    textNode.className = 'ai-text';
                    aiBody.appendChild(textNode);
                  }
                  textNode.innerHTML = marked.parse(fullText);
                  scrollToBottom();
                }
              }
            } catch (e) {
              // Ignore parse errors
            }
          }
        }

        // Final render
        if (!thinkingRemoved) { removeThinking(); thinkingRemoved = true; }
        if (!aiBody && !fullText) {
          addMessageRow('ai', '<span style="color:var(--text-muted)">No response received.</span>');
        }

        // --- Wait for monitor verdict and conditionally show Deploy button ---
        const verdict = await monitorPromise;
        console.log('Monitor verdict:', verdict);

        if (verdict.deployable && aiBody) {
          // Find or create msg-actions container inside this AI message
          let actionsDiv = aiBody.querySelector('.msg-actions');
          if (!actionsDiv) {
            actionsDiv = document.createElement('div');
            actionsDiv.className = 'msg-actions';
            aiBody.appendChild(actionsDiv);
          }
          const deployBtn = document.createElement('button');
          deployBtn.className = 'deploy-btn';
          deployBtn.onclick = function () { deploySample(this); };
          deployBtn.textContent = `Deploy`;
          deployBtn.style.animation = 'fadeIn 0.3s ease';
          actionsDiv.appendChild(deployBtn);
          scrollToBottom();
        }

      } catch (err) {
        removeThinking();
        console.error('Stream error:', err);
        showError(err.message || 'Failed to connect to the API.');
        addMessageRow('ai', `<span style="color:var(--error)">Error: ${escapeHtml(err.message)}</span>`);
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
        scrollToBottom();
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // Focus input on load
    document.getElementById('input').focus();
  </script>
</body>
